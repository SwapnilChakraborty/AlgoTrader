version: '3.8'

services:
  # Next.js Application
  app:
    build:
      context: .
      target: runner
    container_name: algomarket_app
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - NODE_ENV=production
    restart: always

  # Background Worker (Puppeteer + node-cron)
  worker:
    build:
      context: .
      target: worker
    container_name: algomarket_worker
    env_file: .env
    environment:
      - NODE_ENV=production
    restart: always
